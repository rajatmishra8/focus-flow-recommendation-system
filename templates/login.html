<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Focus-Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <span class="brand-icon-lg"></span>
      <h1>Focus-Flow</h1>
      <p>Human-Centered Adaptive<br>Recommendation System</p>
    </div>
    <div class="auth-features">
      <div class="af-item"><span></span> AI-powered study recommendations</div>
      <div class="af-item"><span></span> Pomodoro & focus tools</div>
      <div class="af-item"><span></span> Personal performance insights</div>
      <div class="af-item"><span></span> NLP feedback learning</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2>Welcome back </h2>
      <p class="auth-sub">Sign in to continue your journey</p>
      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-primary btn-full">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Create one</a></p>
    </div>
  </div>
</div>
</body>
</html>
